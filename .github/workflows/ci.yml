name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-build:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.ompack.in/api
          VITE_GA_ID: G-PLACEHOLDER
          VITE_SITE_URL: https://www.ompack.in

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  server-check:
    name: Server — Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Module load smoke test
        run: |
          node --input-type=module -e "
            await import('./server.js').catch(e => {
              if (!/MongoServerError|ECONNREFUSED|ENOTFOUND/.test(e.message)) {
                console.error('Server module failed to load:', e);
                process.exit(1);
              }
              console.log('Server modules import cleanly (DB connection skipped in CI).');
              process.exit(0);
            });
          " &
          sleep 5
          kill %1 2>/dev/null || true

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [client-build, server-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: om-packaging-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: om-packaging-web:ci
          build-args: |
            VITE_API_URL=/api
            VITE_SITE_URL=https://www.ompack.in
          cache-from: type=gha
          cache-to: type=gha,mode=max
