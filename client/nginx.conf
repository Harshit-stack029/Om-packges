server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security headers (frontend; helmet handles the API)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;
    gzip_proxied      any;

    # Reverse-proxy API + SEO endpoints to backend (set API_HOST in compose)
    location /api/ {
        proxy_pass         http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 12m;
    }

    location = /sitemap.xml { proxy_pass http://api:5000/sitemap.xml; }
    # robots.txt is served from /public statically; backend has a fallback at /robots.txt

    # Long-lived cache for fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — everything else returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard error page
    error_page 500 502 503 504 /index.html;
}
